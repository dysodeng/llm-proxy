# =============================================================================
# LLM Proxy 配置文件
# =============================================================================
# 配置加载逻辑：
#   1. 启动时从当前目录读取 config.yaml
#   2. 未填写的项自动使用默认值（见各字段注释）
#   3. 修改配置后需重启服务才能生效
# =============================================================================

# -----------------------------------------------------------------------------
# 服务器配置
# -----------------------------------------------------------------------------
server:
  # 监听端口，默认 8080
  port: 8080

  # 控制台页面中展示的代理访问地址（用于使用指南的 curl 示例）
  # 留空时自动使用 http://localhost:<port>
  # 部署在公网或反向代理后时，填写实际可访问的外部地址
  # 示例：http://192.168.1.100:8080 或 https://llm-proxy.example.com
  show_base_url: ""

# -----------------------------------------------------------------------------
# 日志配置
# -----------------------------------------------------------------------------
log:
  # 日志级别：debug | info | warn | error
  #   - debug：输出所有日志，包含详细调试信息，开发环境使用
  #   - info：输出正常运行信息（默认）
  #   - warn：仅输出警告和错误
  #   - error：仅输出错误
  level: info

  # 日志文件路径，同时写入文件和标准输出（stdout）
  # 日志按天自动轮转，文件名格式：proxy-2006-01-02.log
  # 留空则只输出到 stdout，不写文件
  file: ./logs/proxy.log

  # 日志文件保留天数，超过此天数的旧日志文件自动删除
  # 默认 30 天
  max_age: 30

# -----------------------------------------------------------------------------
# 限流配置
# -----------------------------------------------------------------------------
# 限流算法：令牌桶（Token Bucket）
#   - 桶容量 = burst，以 requests_per_second 的速率持续补充令牌
#   - 每次请求消耗 1 个令牌；桶空时返回 429 Too Many Requests
#   - 限流粒度：按 API Key 单独计算，互不影响
#
# API Key 提取规则：
#   - OpenAI 请求：从 Authorization: Bearer <key> 中提取
#   - Anthropic 请求：优先从 x-api-key: <key> 提取，
#                     其次从 Authorization: Bearer <key> 提取
#
# 生效优先级（高 → 低）：
#   白名单（不限流） > overrides（自定义限速） > default（默认限速）
# -----------------------------------------------------------------------------
rate_limit:
  # 是否启用限流，false 则所有请求直接放行
  enabled: true

  # 默认限速规则，适用于未在 whitelist / overrides 中配置的所有 API Key
  default:
    # 令牌补充速率：每秒向桶中添加的令牌数
    # 即稳定状态下每秒最多允许的请求数
    requests_per_second: 10

    # 令牌桶容量：允许的瞬时并发突发请求数
    # 桶满时可以一次性处理 burst 个请求，之后按 requests_per_second 速率恢复
    # 建议设置为 requests_per_second 的 2 倍左右
    burst: 20

  # 白名单：列表中的 API Key 完全跳过限流检查，直接转发
  # 适用于内部服务或受信任的高频调用方
  # 删除此列表或置为空（whitelist: []）表示无白名单
  whitelist:
    - "sk-test-whitelist"

  # 自定义限速：对特定 API Key 设置独立的限速规则，覆盖 default
  # 适用于需要更高或更低配额的特定调用方
  # 格式：
  #   "<api-key>":
  #     requests_per_second: <数值>
  #     burst: <数值>
  overrides:
    "sk-test-override":
      requests_per_second: 100
      burst: 200

# -----------------------------------------------------------------------------
# 上游服务商配置
# -----------------------------------------------------------------------------
# 代理转发规则：
#   请求路径 /openai/*    → base_url/* （去掉 /openai 前缀后转发）
#   请求路径 /anthropic/* → base_url/* （去掉 /anthropic 前缀后转发）
#
# 示例：
#   POST /openai/v1/chat/completions → https://api.openai.com/v1/chat/completions
#   POST /anthropic/v1/messages      → https://api.anthropic.com/v1/messages
#
# 所有原始请求头（含 Authorization、x-api-key）原样转发，代理不做修改
# -----------------------------------------------------------------------------
providers:
  openai:
    # OpenAI API 上游地址，可替换为兼容 OpenAI 协议的第三方服务地址
    base_url: "https://api.openai.com"

  anthropic:
    # Anthropic API 上游地址
    base_url: "https://api.anthropic.com"
